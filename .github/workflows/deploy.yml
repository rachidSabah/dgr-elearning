name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy DGR eLearning to Cloudflare Pages

    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile || npm install --legacy-peer-deps

      - name: Move API route (not needed for static export)
        run: |
          if [ -d "src/app/api" ]; then
            mkdir -p .api-backup
            mv src/app/api .api-backup/
          fi

      - name: Build for Cloudflare Pages (Static Export)
        run: |
          bun run build:cf || npm run build:cf
        env:
          NEXT_TELEMETRY_DISABLED: '1'
          SKIP_ENV_VALIDATION: '1'
          BUILD_TARGET: 'cloudflare'

      - name: Restore API route
        run: |
          if [ -d ".api-backup/api" ]; then
            mv .api-backup/api src/app/
            rm -rf .api-backup
          fi

      - name: Publish to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: dgr-elearning
          directory: out
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          branch: main
