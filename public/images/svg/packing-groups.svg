<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <text x="300" y="25" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#0c4a6e">Packing Groups - Degree of Danger</text>
  <rect x="50" y="60" width="150" height="280" rx="8" fill="#dc2626" opacity="0.1" stroke="#dc2626" stroke-width="2"/>
  <rect x="50" y="60" width="150" height="40" rx="8" fill="#dc2626"/>
  <text x="125" y="85" text-anchor="middle" font-family="Arial Black" font-size="16" font-weight="900" fill="#ffffff">GROUP I</text>
  <text x="125" y="120" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#991b1b">HIGH DANGER</text>
  <g transform="translate(95, 140)">
    <rect x="0" y="0" width="60" height="60" fill="#dc2626" stroke="#0f172a" stroke-width="1.5"/>
    <line x1="0" y1="20" x2="60" y2="20" stroke="#0f172a" stroke-width="1"/>
    <text x="30" y="45" text-anchor="middle" font-size="20" font-weight="bold" fill="#ffffff">I</text>
  </g>
  <text x="125" y="230" text-anchor="middle" font-family="Arial" font-size="10" fill="#0f172a">Great danger</text>
  <text x="125" y="250" text-anchor="middle" font-family="Arial" font-size="9" fill="#64748b">e.g., Dynamite,</text>
  <text x="125" y="265" text-anchor="middle" font-family="Arial" font-size="9" fill="#64748b">concentrated acids</text>
  <text x="125" y="315" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#991b1b">Strictest packaging</text>
  <rect x="225" y="60" width="150" height="280" rx="8" fill="#f59e0b" opacity="0.1" stroke="#f59e0b" stroke-width="2"/>
  <rect x="225" y="60" width="150" height="40" rx="8" fill="#f59e0b"/>
  <text x="300" y="85" text-anchor="middle" font-family="Arial Black" font-size="16" font-weight="900" fill="#ffffff">GROUP II</text>
  <text x="300" y="120" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#b45309">MEDIUM DANGER</text>
  <g transform="translate(270, 140)">
    <rect x="0" y="0" width="60" height="60" fill="#f59e0b" stroke="#0f172a" stroke-width="1.5"/>
    <line x1="0" y1="20" x2="60" y2="20" stroke="#0f172a" stroke-width="1"/>
    <text x="30" y="45" text-anchor="middle" font-size="18" font-weight="bold" fill="#ffffff">II</text>
  </g>
  <text x="300" y="230" text-anchor="middle" font-family="Arial" font-size="10" fill="#0f172a">Medium danger</text>
  <text x="300" y="250" text-anchor="middle" font-family="Arial" font-size="9" fill="#64748b">e.g., Gasoline,</text>
  <text x="300" y="265" text-anchor="middle" font-family="Arial" font-size="9" fill="#64748b">most flammable liquids</text>
  <text x="300" y="315" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#b45309">Standard packaging</text>
  <rect x="400" y="60" width="150" height="280" rx="8" fill="#16a34a" opacity="0.1" stroke="#16a34a" stroke-width="2"/>
  <rect x="400" y="60" width="150" height="40" rx="8" fill="#16a34a"/>
  <text x="475" y="85" text-anchor="middle" font-family="Arial Black" font-size="16" font-weight="900" fill="#ffffff">GROUP III</text>
  <text x="475" y="120" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#15803d">MINOR DANGER</text>
  <g transform="translate(445, 140)">
    <rect x="0" y="0" width="60" height="60" fill="#16a34a" stroke="#0f172a" stroke-width="1.5"/>
    <line x1="0" y1="20" x2="60" y2="20" stroke="#0f172a" stroke-width="1"/>
    <text x="30" y="45" text-anchor="middle" font-size="18" font-weight="bold" fill="#ffffff">III</text>
  </g>
  <text x="475" y="230" text-anchor="middle" font-family="Arial" font-size="10" fill="#0f172a">Minor danger</text>
  <text x="475" y="250" text-anchor="middle" font-family="Arial" font-size="9" fill="#64748b">e.g., Dry ice,</text>
  <text x="475" y="265" text-anchor="middle" font-family="Arial" font-size="9" fill="#64748b">some products</text>
  <text x="475" y="315" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#15803d">Basic packaging</text>
</svg>