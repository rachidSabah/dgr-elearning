<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <text x="300" y="25" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#0c4a6e">Transport Index (TI) - Radiation Control</text>
  <rect x="50" y="60" width="150" height="200" rx="8" fill="#ffffff" stroke="#0f172a" stroke-width="2"/>
  <rect x="50" y="60" width="150" height="35" rx="8" fill="#ffffff" stroke="#0f172a" stroke-width="2"/>
  <text x="125" y="83" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#0f172a">CATEGORY I</text>
  <text x="125" y="115" text-anchor="middle" font-family="Arial" font-size="10" fill="#0f172a">WHITE label</text>
  <text x="125" y="180" text-anchor="middle" font-family="Arial" font-size="24" font-weight="bold" fill="#0f172a">RRW</text>
  <text x="125" y="215" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#15803d">No restriction</text>
  <text x="125" y="235" text-anchor="middle" font-family="Arial" font-size="9" fill="#64748b">TI less than 0.05</text>
  <rect x="225" y="60" width="150" height="200" rx="8" fill="#eab308" opacity="0.2" stroke="#f59e0b" stroke-width="2"/>
  <rect x="225" y="60" width="150" height="35" rx="8" fill="#eab308" stroke="#f59e0b" stroke-width="2"/>
  <text x="300" y="83" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#0f172a">CATEGORY II</text>
  <text x="300" y="115" text-anchor="middle" font-family="Arial" font-size="10" fill="#0f172a">YELLOW label</text>
  <text x="300" y="180" text-anchor="middle" font-family="Arial" font-size="24" font-weight="bold" fill="#0f172a">RRY</text>
  <rect x="270" y="195" width="60" height="20" fill="#ffffff" stroke="#0f172a" stroke-width="1.5"/>
  <text x="300" y="209" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#0f172a">TI</text>
  <text x="300" y="235" text-anchor="middle" font-family="Arial" font-size="9" fill="#64748b">0.05 to 1</text>
  <rect x="400" y="60" width="150" height="200" rx="8" fill="#eab308" opacity="0.4" stroke="#b45309" stroke-width="2"/>
  <rect x="400" y="60" width="150" height="35" rx="8" fill="#eab308" stroke="#b45309" stroke-width="2"/>
  <text x="475" y="83" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#0f172a">CATEGORY III</text>
  <text x="475" y="115" text-anchor="middle" font-family="Arial" font-size="10" fill="#0f172a">YELLOW label</text>
  <text x="475" y="180" text-anchor="middle" font-family="Arial" font-size="24" font-weight="bold" fill="#0f172a">RRY</text>
  <rect x="445" y="195" width="60" height="20" fill="#ffffff" stroke="#0f172a" stroke-width="1.5"/>
  <text x="475" y="209" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#0f172a">TI</text>
  <text x="475" y="235" text-anchor="middle" font-family="Arial" font-size="9" fill="#64748b">TI greater than 1</text>
  <rect x="50" y="285" width="500" height="80" rx="6" fill="#0c4a6e" opacity="0.05" stroke="#0c4a6e" stroke-width="1"/>
  <text x="300" y="305" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#0c4a6e">PERMITTED TOTAL TRANSPORT INDEX</text>
  <rect x="80" y="320" width="180" height="35" rx="4" fill="#0ea5e9" opacity="0.2"/>
  <text x="170" y="335" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#0369a1">Passenger Aircraft</text>
  <text x="170" y="350" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#dc2626">Max 50 TI</text>
  <rect x="340" y="320" width="180" height="35" rx="4" fill="#16a34a" opacity="0.2"/>
  <text x="430" y="335" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#15803d">Freighter Aircraft</text>
  <text x="430" y="350" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#dc2626">Max 200 TI</text>
</svg>