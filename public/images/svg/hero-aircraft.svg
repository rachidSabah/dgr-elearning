<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0ea5e9" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0369a1" stop-opacity="0.1"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="400" fill="url(#sky)"/>
  <!-- Clouds -->
  <g fill="#ffffff" opacity="0.3">
    <ellipse cx="200" cy="80" rx="60" ry="20"/>
    <ellipse cx="240" cy="75" rx="40" ry="15"/>
    <ellipse cx="800" cy="100" rx="80" ry="25"/>
    <ellipse cx="850" cy="95" rx="50" ry="18"/>
    <ellipse cx="1000" cy="60" rx="50" ry="18"/>
  </g>
  <!-- Aircraft silhouette -->
  <g transform="translate(600, 200)" fill="#ffffff" opacity="0.9">
    <!-- Fuselage -->
    <ellipse cx="0" cy="0" rx="200" ry="30"/>
    <!-- Nose -->
    <ellipse cx="-200" cy="0" rx="30" ry="25"/>
    <!-- Tail -->
    <path d="M 180,-5 L 220,-60 L 240,-60 L 220,0 Z"/>
    <!-- Wings -->
    <ellipse cx="0" cy="20" rx="150" ry="8"/>
    <!-- Engines -->
    <ellipse cx="-50" cy="35" rx="30" ry="12"/>
    <ellipse cx="50" cy="35" rx="30" ry="12"/>
    <!-- Windows -->
    <g fill="#0369a1" opacity="0.5">
      <rect x="-150" y="-5" width="8" height="6" rx="1"/>
      <rect x="-130" y="-5" width="8" height="6" rx="1"/>
      <rect x="-110" y="-5" width="8" height="6" rx="1"/>
      <rect x="-90" y="-5" width="8" height="6" rx="1"/>
      <rect x="-70" y="-5" width="8" height="6" rx="1"/>
      <rect x="-50" y="-5" width="8" height="6" rx="1"/>
      <rect x="-30" y="-5" width="8" height="6" rx="1"/>
      <rect x="-10" y="-5" width="8" height="6" rx="1"/>
      <rect x="10" y="-5" width="8" height="6" rx="1"/>
      <rect x="30" y="-5" width="8" height="6" rx="1"/>
      <rect x="50" y="-5" width="8" height="6" rx="1"/>
      <rect x="70" y="-5" width="8" height="6" rx="1"/>
      <rect x="90" y="-5" width="8" height="6" rx="1"/>
      <rect x="110" y="-5" width="8" height="6" rx="1"/>
      <rect x="130" y="-5" width="8" height="6" rx="1"/>
      <rect x="150" y="-5" width="8" height="6" rx="1"/>
    </g>
  </g>
</svg>