<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <text x="300" y="25" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#0c4a6e">Aircraft Door - Armed vs Disarmed</text>
  <text x="150" y="55" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#15803d">DISARMED (Normal)</text>
  <rect x="80" y="70" width="140" height="280" rx="4" fill="none" stroke="#64748b" stroke-width="3"/>
  <rect x="90" y="80" width="120" height="260" rx="4" fill="#e2e8f0" stroke="#64748b" stroke-width="2"/>
  <rect x="140" y="200" width="20" height="60" rx="3" fill="#64748b" stroke="#0f172a" stroke-width="1"/>
  <line x1="100" y1="230" x2="200" y2="230" stroke="#0f172a" stroke-width="3"/>
  <text x="150" y="360" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#15803d">OK Slide disarmed</text>
  <text x="150" y="375" text-anchor="middle" font-family="Arial" font-size="9" fill="#64748b">Door opens normally</text>
  <polygon points="280,190 310,190 310,180 330,210 310,230 310,220 280,220" fill="#f59e0b" stroke="#b45309" stroke-width="1"/>
  <text x="300" y="245" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#b45309">ARM</text>
  <text x="450" y="55" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#991b1b">ARMED (Emergency)</text>
  <rect x="380" y="70" width="140" height="280" rx="4" fill="none" stroke="#64748b" stroke-width="3"/>
  <rect x="390" y="80" width="120" height="260" rx="4" fill="#e2e8f0" stroke="#64748b" stroke-width="2"/>
  <rect x="440" y="200" width="20" height="60" rx="3" fill="#dc2626" stroke="#0f172a" stroke-width="1"/>
  <line x1="450" y1="190" x2="450" y2="270" stroke="#dc2626" stroke-width="3"/>
  <circle cx="450" cy="150" r="15" fill="#dc2626" stroke="#ffffff" stroke-width="2"/>
  <text x="450" y="155" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#ffffff">A</text>
  <rect x="420" y="280" width="60" height="15" rx="2" fill="#f59e0b" stroke="#b45309" stroke-width="1"/>
  <text x="450" y="291" text-anchor="middle" font-family="Arial" font-size="7" font-weight="bold" fill="#ffffff">SLIDE</text>
  <text x="450" y="360" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#991b1b">! Slide armed</text>
  <text x="450" y="375" text-anchor="middle" font-family="Arial" font-size="9" fill="#64748b">Opening deploys slide</text>
</svg>