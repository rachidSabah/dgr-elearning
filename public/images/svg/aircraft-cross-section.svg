  <rect x="420" y="210" width="280" height="70" rx="8" fill="url(#cargo)" opacity="0.8"/>
  <text x="560" y="235" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#ffffff">AFT CARGO HOLD</text>
  <text x="560" y="250" text-anchor="middle" font-family="Arial" font-size="9" fill="#e2e8f0">Magnetised material (AFT only)</text>
