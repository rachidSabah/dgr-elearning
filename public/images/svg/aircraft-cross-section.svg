  </defs>
  <text x="400" y="25" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#0c4a6e">Aircraft Cross-Section - Dangerous Goods Stowage</text>
  <ellipse cx="400" cy="210" rx="350" ry="160" fill="url(#fus)" stroke="#64748b" stroke-width="2"/>
  <rect x="80" y="200" width="640" height="6" fill="#64748b"/>
  <rect x="100" y="80" width="600" height="120" rx="10" fill="#0ea5e9" opacity="0.1" stroke="#0ea5e9" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="400" y="100" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#0369a1">PASSENGER CABIN</text>
  <text x="400" y="115" text-anchor="middle" font-family="Arial" font-size="9" fill="#64748b">No Dangerous Goods (except passenger provisions)</text>
  <g fill="#0ea5e9" opacity="0.6">
    <rect x="130" y="140" width="30" height="25" rx="3"/><rect x="180" y="140" width="30" height="25" rx="3"/>
