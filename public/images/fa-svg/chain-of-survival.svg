<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250">
  <text x="400" y="25" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#991b1b">Chain of Survival - Cardiac Arrest Response</text>
  <text x="400" y="42" text-anchor="middle" font-family="Arial" font-size="10" fill="#64748b">Best chance of survival when all links are present</text>
  <g font-family="Arial" font-size="10" text-anchor="middle">
    <ellipse cx="100" cy="130" rx="75" ry="50" fill="#dc2626" opacity="0.8" stroke="#991b1b" stroke-width="2"/>
    <text x="100" y="120" fill="#ffffff" font-weight="bold" font-size="12">Early</text><text x="100" y="135" fill="#ffffff" font-weight="bold" font-size="12">Access</text>
    <text x="100" y="155" fill="#ffffff" font-size="8">Call for help</text><text x="100" y="167" fill="#ffffff" font-size="8">Assess DRABC</text>
    <ellipse cx="300" cy="130" rx="75" ry="50" fill="#f59e0b" opacity="0.8" stroke="#b45309" stroke-width="2"/>
    <text x="300" y="120" fill="#ffffff" font-weight="bold" font-size="12">Early</text><text x="300" y="135" fill="#ffffff" font-weight="bold" font-size="12">CPR</text>
    <text x="300" y="155" fill="#ffffff" font-size="8">30:2 compressions</text><text x="300" y="167" fill="#ffffff" font-size="8">Start immediately</text>
    <ellipse cx="500" cy="130" rx="75" ry="50" fill="#0ea5e9" opacity="0.8" stroke="#0369a1" stroke-width="2"/>
    <text x="500" y="120" fill="#ffffff" font-weight="bold" font-size="12">Early</text><text x="500" y="135" fill="#ffffff" font-weight="bold" font-size="12">Defibrillation</text>
    <text x="500" y="155" fill="#ffffff" font-size="8">Use AED</text><text x="500" y="167" fill="#ffffff" font-size="8">Follow prompts</text>
    <ellipse cx="700" cy="130" rx="75" ry="50" fill="#16a34a" opacity="0.8" stroke="#15803d" stroke-width="2"/>
    <text x="700" y="120" fill="#ffffff" font-weight="bold" font-size="12">Early</text><text x="700" y="135" fill="#ffffff" font-weight="bold" font-size="12">Advanced Care</text>
    <text x="700" y="155" fill="#ffffff" font-size="8">Medical team</text><text x="700" y="167" fill="#ffffff" font-size="8">takes over</text>
    <line x1="175" y1="130" x2="225" y2="130" stroke="#64748b" stroke-width="3"/><polygon points="225,125 235,130 225,135" fill="#64748b"/>
    <line x1="375" y1="130" x2="425" y2="130" stroke="#64748b" stroke-width="3"/><polygon points="425,125 435,130 425,135" fill="#64748b"/>
    <line x1="575" y1="130" x2="625" y2="130" stroke="#64748b" stroke-width="3"/><polygon points="625,125 635,130 625,135" fill="#64748b"/>
  </g>
  <text x="400" y="220" text-anchor="middle" font-family="Arial" font-size="10" fill="#991b1b" font-weight="bold">Every minute delay = 7-10% decrease in survival chance</text>
</svg>