<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250">
  <text x="400" y="25" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#0d9488">RICE Treatment for Strains and Sprains</text>
  <g font-family="Arial" font-size="10" text-anchor="middle">
    <circle cx="100" cy="130" r="55" fill="#dc2626" opacity="0.15" stroke="#dc2626" stroke-width="2"/>
    <text x="100" y="110" fill="#991b1b" font-weight="bold" font-size="28">R</text>
    <text x="100" y="135" fill="#0f172a" font-weight="bold" font-size="11">REST</text>
    <text x="100" y="155" fill="#64748b" font-size="8">Steady and support</text><text x="100" y="167" fill="#64748b" font-size="8">the injured part</text>
    <text x="100" y="195" fill="#64748b" font-size="8">Stop activity</text><text x="100" y="207" fill="#64748b" font-size="8">immediately</text>
    <circle cx="270" cy="130" r="55" fill="#0ea5e9" opacity="0.15" stroke="#0ea5e9" stroke-width="2"/>
    <text x="270" y="110" fill="#0369a1" font-weight="bold" font-size="28">I</text>
    <text x="270" y="135" fill="#0f172a" font-weight="bold" font-size="11">ICE</text>
    <text x="270" y="155" fill="#64748b" font-size="8">Ice pack 10-15 min</text><text x="270" y="167" fill="#64748b" font-size="8">OR cold compress</text>
    <text x="270" y="195" fill="#64748b" font-size="8">Cold compress</text><text x="270" y="207" fill="#64748b" font-size="8">at least 20 min</text>
    <circle cx="440" cy="130" r="55" fill="#f59e0b" opacity="0.15" stroke="#f59e0b" stroke-width="2"/>
    <text x="440" y="110" fill="#b45309" font-weight="bold" font-size="28">C</text>
    <text x="440" y="135" fill="#0f172a" font-weight="bold" font-size="11">COMPRESS</text>
    <text x="440" y="155" fill="#64748b" font-size="8">Thick layer padding</text><text x="440" y="167" fill="#64748b" font-size="8">Gentle, even pressure</text>
    <text x="440" y="195" fill="#64748b" font-size="8">Bandage firmly</text><text x="440" y="207" fill="#64748b" font-size="8">but not too tight</text>
    <circle cx="610" cy="130" r="55" fill="#16a34a" opacity="0.15" stroke="#16a34a" stroke-width="2"/>
    <text x="610" y="110" fill="#15803d" font-weight="bold" font-size="28">E</text>
    <text x="610" y="135" fill="#0f172a" font-weight="bold" font-size="11">ELEVATE</text>
    <text x="610" y="155" fill="#64748b" font-size="8">Support injured</text><text x="610" y="167" fill="#64748b" font-size="8">limb elevated</text>
    <text x="610" y="195" fill="#64748b" font-size="8">Above heart level</text><text x="610" y="207" fill="#64748b" font-size="8">if possible</text>
  </g>
  <text x="400" y="235" text-anchor="middle" font-family="Arial" font-size="9" fill="#64748b">Strains = overstretched muscles | Sprains = torn ligaments around joints</text>
</svg>