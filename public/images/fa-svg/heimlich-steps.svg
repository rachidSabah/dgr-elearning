<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350">
  <text x="400" y="25" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#ea580c">Heimlich Manoeuvre - Abdominal Thrusts</text>
  <g font-family="Arial" font-size="10" text-anchor="middle">
    <rect x="20" y="50" width="180" height="250" rx="8" fill="#ea580c" opacity="0.1" stroke="#ea580c" stroke-width="1.5"/>
    <circle cx="110" cy="85" r="20" fill="#ea580c"/><text x="110" y="90" fill="#ffffff" font-weight="bold" font-size="14">1</text>
    <text x="110" y="125" fill="#0f172a" font-weight="bold">Encourage</text><text x="110" y="138" fill="#0f172a" font-weight="bold">COUGHING</text>
    <text x="110" y="165" fill="#64748b">First action for</text><text x="110" y="178" fill="#64748b">conscious adult</text>
    <rect x="215" y="50" width="180" height="250" rx="8" fill="#f59e0b" opacity="0.1" stroke="#f59e0b" stroke-width="1.5"/>
    <circle cx="305" cy="85" r="20" fill="#f59e0b"/><text x="305" y="90" fill="#ffffff" font-weight="bold" font-size="14">2</text>
    <text x="305" y="125" fill="#0f172a" font-weight="bold">Bend FORWARD</text>
    <text x="305" y="148" fill="#64748b">Head lower than chest</text>
    <text x="305" y="185" fill="#64748b">Give 5 SHARP back slaps</text><text x="305" y="198" fill="#64748b">between shoulder blades</text>
    <rect x="410" y="50" width="180" height="250" rx="8" fill="#dc2626" opacity="0.1" stroke="#dc2626" stroke-width="1.5"/>
    <circle cx="500" cy="85" r="20" fill="#dc2626"/><text x="500" y="90" fill="#ffffff" font-weight="bold" font-size="14">3</text>
    <text x="500" y="125" fill="#0f172a" font-weight="bold">HEIMLICH MANOEUVRE</text>
    <text x="500" y="165" fill="#64748b">Stand behind, interlock fingers</text><text x="500" y="178" fill="#64748b">around waist</text>
    <text x="500" y="210" fill="#991b1b" font-weight="bold">Fist above navel</text><text x="500" y="223" fill="#991b1b" font-weight="bold">Pull sharply</text><text x="500" y="236" fill="#991b1b" font-weight="bold">INWARD and UPWARD</text>
    <text x="500" y="255" fill="#64748b">Do up to 5 times</text>
    <rect x="605" y="50" width="180" height="250" rx="8" fill="#7c3aed" opacity="0.1" stroke="#7c3aed" stroke-width="1.5"/>
    <circle cx="695" cy="85" r="20" fill="#7c3aed"/><text x="695" y="90" fill="#ffffff" font-weight="bold" font-size="14">4</text>
    <text x="695" y="125" fill="#0f172a" font-weight="bold">ALTERNATE</text>
    <text x="695" y="148" fill="#64748b">5 back slaps + 5 Heimlich</text>
    <text x="695" y="200" fill="#64748b">Continue until obstruction</text><text x="695" y="213" fill="#64748b">cleared or unconscious</text>
    <text x="695" y="255" fill="#991b1b" font-weight="bold">If unconscious: Start CPR</text>
  </g>
  <text x="400" y="330" text-anchor="middle" font-family="Arial" font-size="10" fill="#991b1b" font-weight="bold">Death may occur within 3-4 minutes if obstruction is not removed</text>
</svg>