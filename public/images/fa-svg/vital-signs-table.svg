<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 350">
  <text x="300" y="25" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#0c4a6e">Normal Vital Signs by Age Group</text>
  <g font-family="Arial" font-size="11" text-anchor="middle">
    <rect x="50" y="50" width="500" height="40" fill="#0c4a6e"/>
    <text x="175" y="75" fill="#ffffff">ADULT</text><text x="300" y="75" fill="#ffffff">CHILD</text><text x="425" y="75" fill="#ffffff">INFANT</text>
    <rect x="50" y="90" width="150" height="40" fill="#0ea5e9" opacity="0.2"/><text x="125" y="115" fill="#0f172a" font-weight="bold">Pulse Rate</text>
    <rect x="200" y="90" width="125" height="40" fill="#ffffff" stroke="#e2e8f0"/><text x="262" y="115" fill="#991b1b" font-weight="bold">60-80/min</text>
    <rect x="325" y="90" width="125" height="40" fill="#ffffff" stroke="#e2e8f0"/><text x="387" y="115" fill="#b45309" font-weight="bold">80-100/min</text>
    <rect x="450" y="90" width="100" height="40" fill="#ffffff" stroke="#e2e8f0"/><text x="500" y="115" fill="#ec4899" font-weight="bold">100-120/min</text>
    <rect x="50" y="130" width="150" height="40" fill="#0ea5e9" opacity="0.2"/><text x="125" y="155" fill="#0f172a" font-weight="bold">Breathing Rate</text>
    <rect x="200" y="130" width="125" height="40" fill="#ffffff" stroke="#e2e8f0"/><text x="262" y="155" fill="#991b1b" font-weight="bold">16-20/min</text>
    <rect x="325" y="130" width="125" height="40" fill="#ffffff" stroke="#e2e8f0"/><text x="387" y="155" fill="#b45309" font-weight="bold">20-24/min</text>
    <rect x="450" y="130" width="100" height="40" fill="#ffffff" stroke="#e2e8f0"/><text x="500" y="155" fill="#ec4899" font-weight="bold">24-28/min</text>
  </g>
  <g font-family="Arial" font-size="10">
    <rect x="50" y="190" width="500" height="140" rx="8" fill="#f59e0b" opacity="0.08" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="300" y="215" text-anchor="middle" fill="#b45309" font-weight="bold" font-size="11">CAUSES OF ABNORMAL RATES</text>
    <text x="70" y="240" fill="#991b1b" font-weight="bold">Rapid pulse/breathing:</text>
    <text x="70" y="258" fill="#64748b">Exercise, emotional conditions (stress/anxiety),</text>
    <text x="70" y="272" fill="#64748b">Fever, Bleeding, Shock</text>
    <text x="320" y="240" fill="#0369a1" font-weight="bold">Slow pulse/breathing:</text>
    <text x="320" y="258" fill="#64748b">Rest and sleep,</text>
    <text x="320" y="272" fill="#64748b">Head injuries, Brain diseases (e.g. Stroke)</text>
    <text x="70" y="300" fill="#0c4a6e" font-weight="bold">Pulse Points:</text>
    <text x="70" y="316" fill="#64748b">Radial (wrist) | Carotid (neck) | Brachial (upper arm for infants)</text>
    <text x="70" y="330" fill="#64748b">Record: Rate (beats/min) | Strength (strong/weak) | Rhythm (regular/irregular)</text>
  </g>
</svg>