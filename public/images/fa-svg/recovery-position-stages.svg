<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <text x="400" y="25" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#7c3aed">Recovery Position - 5 Stages</text>
  <text x="400" y="42" text-anchor="middle" font-family="Arial" font-size="10" fill="#64748b">THE AIRWAY IS ALWAYS THE PRIORITY</text>
  <g font-family="Arial" font-size="9" text-anchor="middle">
    <rect x="20" y="60" width="140" height="280" rx="8" fill="#7c3aed" opacity="0.1" stroke="#7c3aed" stroke-width="1.5"/>
    <rect x="20" y="60" width="140" height="30" rx="8" fill="#7c3aed"/><text x="90" y="80" fill="#ffffff" font-weight="bold" font-size="11">STAGE 1</text>
    <text x="90" y="110" fill="#0f172a">Remove spectacles</text><text x="90" y="125" fill="#0f172a">and bulky objects</text>
    <text x="90" y="150" fill="#0f172a">Straighten legs</text>
    <text x="90" y="175" fill="#0f172a">Place arm nearest</text><text x="90" y="188" fill="#0f172a">to you at right</text><text x="90" y="201" fill="#0f172a">angle, palm up</text>
    <text x="90" y="230" fill="#64748b">Check for</text><text x="90" y="243" fill="#64748b">Medical Tags</text>
    <rect x="175" y="60" width="140" height="280" rx="8" fill="#0ea5e9" opacity="0.1" stroke="#0ea5e9" stroke-width="1.5"/>
    <rect x="175" y="60" width="140" height="30" rx="8" fill="#0ea5e9"/><text x="245" y="80" fill="#ffffff" font-weight="bold" font-size="11">STAGE 2</text>
    <text x="245" y="110" fill="#0f172a">Bring other arm</text><text x="245" y="123" fill="#0f172a">across the chest</text>
    <text x="245" y="150" fill="#0f172a">Hold casualty's</text><text x="245" y="163" fill="#0f172a">hand against</text><text x="245" y="176" fill="#0f172a">their cheek</text>
    <text x="245" y="205" fill="#64748b">Support head</text><text x="245" y="218" fill="#64748b">throughout</text><text x="245" y="247" fill="#64748b">stages 3, 4, 5</text>
    <rect x="330" y="60" width="140" height="280" rx="8" fill="#f59e0b" opacity="0.1" stroke="#f59e0b" stroke-width="1.5"/>
    <rect x="330" y="60" width="140" height="30" rx="8" fill="#f59e0b"/><text x="400" y="80" fill="#ffffff" font-weight="bold" font-size="11">STAGE 3</text>
    <text x="400" y="110" fill="#0f172a">Grasp casualty's</text><text x="400" y="123" fill="#0f172a">leg just above</text><text x="400" y="136" fill="#0f172a">the knee</text>
    <text x="400" y="160" fill="#0f172a">Lift and bend</text><text x="400" y="173" fill="#0f172a">the knee</text>
    <text x="400" y="200" fill="#0f172a">Foot stays</text><text x="400" y="213" fill="#0f172a">on the floor</text>
    <rect x="485" y="60" width="140" height="280" rx="8" fill="#16a34a" opacity="0.1" stroke="#16a34a" stroke-width="1.5"/>
    <rect x="485" y="60" width="140" height="30" rx="8" fill="#16a34a"/><text x="555" y="80" fill="#ffffff" font-weight="bold" font-size="11">STAGE 4</text>
    <text x="555" y="110" fill="#0f172a">Maintain grasp</text><text x="555" y="123" fill="#0f172a">of the thigh</text>
    <text x="555" y="150" fill="#0f172a">Pull towards you</text>
    <text x="555" y="175" fill="#0f172a">Use your knees</text><text x="555" y="188" fill="#0f172a">to stop rolling</text><text x="555" y="201" fill="#0f172a">too far</text>
    <rect x="640" y="60" width="140" height="280" rx="8" fill="#dc2626" opacity="0.1" stroke="#dc2626" stroke-width="1.5"/>
    <rect x="640" y="60" width="140" height="30" rx="8" fill="#dc2626"/><text x="710" y="80" fill="#ffffff" font-weight="bold" font-size="11">STAGE 5</text>
    <text x="710" y="110" fill="#0f172a">Adjust upper leg</text><text x="710" y="123" fill="#0f172a">hip and knee</text><text x="710" y="136" fill="#0f172a">both bent</text>
    <text x="710" y="165" fill="#0f172a">Draw chin forward</text><text x="710" y="178" fill="#0f172a">to clear tongue</text><text x="710" y="191" fill="#0f172a">from throat</text>
    <text x="710" y="220" fill="#991b1b" font-weight="bold">Aid drainage</text><text x="710" y="233" fill="#991b1b" font-weight="bold">Clear airway!</text>
  </g>
  <text x="400" y="370" text-anchor="middle" font-family="Arial" font-size="10" fill="#991b1b" font-weight="bold">REMEMBER: The airway is ALWAYS the priority!</text>
</svg>